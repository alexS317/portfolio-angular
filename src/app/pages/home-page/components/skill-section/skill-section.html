<div class="flex flex-col gap-4">
  <h3 class="text-teal-300">{{ skills().title }}</h3>
  <p>{{ skills().description }}</p>
  @for (section of skills().section; track $index) {
    <div class="flex flex-col gap-2">
      @if (section.subtitle) {
        <h4 class="text-teal-200">{{ section.subtitle }}</h4>
      }
      <ul class="ml-8 list-disc">
        @for (skill of section.list; track $index) {
          <li>{{ skill }}</li>
        }
      </ul>
    </div>
  }
</div>
