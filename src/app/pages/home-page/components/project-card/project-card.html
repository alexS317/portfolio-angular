<a
  class="group flex flex-col gap-2"
  [routerLink]="'projects/' + project().category + '/' + project().id"
>
  <img
    class="aspect-video object-contain object-top"
    [ngSrc]="'images/projects/' + project().id + '/' + project().media[0]"
    alt=""
    width="1920"
    height="1080"
    loading="lazy"
  />
  <div class="flex flex-row justify-between">
    <div class="flex flex-col font-bold">
      <h4>{{ project().title }}</h4>
      <p>{{ project().studyProgramme }}</p>
    </div>
    <i
      class="pi pi-arrow-right text-3xl transition duration-200 ease-in-out group-hover:translate-x-1"
    ></i>
  </div>
</a>
