<a class="flex flex-col gap-2" [routerLink]="'projects/' + project().id">
  <img [src]="'images/projects/' + project().id + '/' + project().images[0]" alt="" />
  <div class="flex flex-row justify-between">
    <div class="flex flex-col font-bold">
      <h4>{{ project().title }}</h4>
      <p>{{ project().studyProgramme }}</p>
    </div>
    <i class="pi pi-arrow-right text-3xl"></i>
  </div>
</a>
