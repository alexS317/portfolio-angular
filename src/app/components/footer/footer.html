<footer class="mt-8 flex flex-col items-center text-center text-[10px] text-slate-400">
  <p>{{ 'app.home.heading' | translate }}</p>
  <div class="flex flex-row">
    <p class="font-bold">Email:&nbsp;</p>
    <a class="underline" [href]="'mailto:' + email()"> {{ email() }} </a>
  </div>
  <span>
    <span>{{ 'app.footer.builtWith' | translate }}{{ lastUpdated() | date: 'longDate' }}. </span>
    <a
      [href]="'app.footer.githubLink' | translate"
      target="_blank"
      rel="noopener noreferrer"
      class="underline"
      >GitHub Repo</a
    >
  </span>
  <p [innerHTML]="'app.footer.credits' | translate"></p>
  <p>{{ 'app.footer.aiConsent' | translate }}</p>
</footer>
